<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Team Shuffle - GullyScore</title>
    <link rel="stylesheet" href="css/style.css">
    <meta name="theme-color" content="#121212">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="top-nav">
            <a href="player-registration.html" class="icon-btn"><i class="fa-solid fa-arrow-left"></i></a>
            <div class="brand"><h2>Teams</h2></div>
            <button class="icon-btn" id="shuffleBtn"><i class="fa-solid fa-shuffle"></i></button>
        </header>

        <main class="content fade-in">
            <div class="action-grid">
                <div class="secondary-card" style="grid-column: 1 / -1;">
                    <h3>Team A</h3>
                    <div id="teamAList" class="player-list mt-4" style="width: 100%;">
                        <div class="loading-spinner"></div>
                    </div>
                </div>
                
                <div class="secondary-card" style="grid-column: 1 / -1;">
                    <h3>Team B</h3>
                    <div id="teamBList" class="player-list mt-4" style="width: 100%;">
                        <div class="loading-spinner"></div>
                    </div>
                </div>
            </div>
            
            <div class="mt-4">
                <a href="toss.html" class="btn btn-primary btn-block">Next: Toss</a>
            </div>
        </main>
    </div>
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
