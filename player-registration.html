<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Player Registration - GullyScore</title>
    <link rel="stylesheet" href="css/style.css">
    <meta name="theme-color" content="#121212">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="top-nav">
            <a href="match-creation.html" class="icon-btn"><i class="fa-solid fa-arrow-left"></i></a>
            <div class="brand"><h2>Players</h2></div>
            <button class="icon-btn" id="addPlayerBtn" title="Advanced Options"><i class="fa-solid fa-sliders"></i></button>
        </header>

        <main class="content fade-in">
            <div class="page-header mb-4">
                <p>Select playing squad for this match.</p>
                <p style="font-size: 0.9rem; color: var(--text-muted);">Only 'Available' global players are shown.</p>
            </div>

            <div class="list-group" id="globalAvailableList" style="margin-bottom: 30px;">
                <div class="loading-spinner"></div>
            </div>
            
            <div class="mt-4 pb-4">
                <p class="text-center mb-3">Selected: <strong id="selectedCount" class="text-primary">0</strong></p>
                <button id="confirmMatchPlayersBtn" class="btn btn-primary btn-block">Next: Shuffle Teams</button>
            </div>
        </main>
    </div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
