<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Score - GullyScore</title>
    <link rel="stylesheet" href="css/style.css">
    <meta name="theme-color" content="#121212">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="top-nav">
            <a href="index.html" class="icon-btn text-primary"><i class="fa-solid fa-home"></i></a>
            <div class="brand">
                <i class="fa-solid fa-circle text-danger blink" style="font-size: 0.6rem;"></i>
                <h2 style="font-size: 1.2rem;">Live</h2>
            </div>
            <div class="header-actions">
                <a href="match-summary.html" class="icon-btn text-accent" aria-label="Stats"><i class="fa-solid fa-chart-simple"></i></a>
                <button class="icon-btn" id="undoBtn" aria-label="Undo"><i class="fa-solid fa-rotate-left"></i></button>
                <button class="icon-btn" id="shareBtn" aria-label="Share"><i class="fa-solid fa-share-nodes"></i></button>
            </div>
        </header>

        <main class="content fade-in" style="padding-bottom: 20px;">
            <div class="score-board">
                <div style="font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;">Team A Batting</div>
                <div class="main-score">
                    <span id="runs">0</span><span style="color: var(--text-muted); font-size: 2.5rem;">/</span><span id="wickets">0</span>
                </div>
                <div class="overs-info">
                    Overs: <strong style="color: var(--text-primary);" id="overs">0.0</strong> / <span id="totalOvers">5</span>
                </div>
                
                <div class="crr-req hidden" id="targetSection">
                    <div>CRR: <span id="crr">0.00</span></div>
                    <div>Target: <strong class="text-primary" id="target">0</strong></div>
                    <div>REQ: <span id="reqRate">0.00</span></div>
                </div>
                
                <div class="over-tracker mt-4" id="overTracker">
                    <!-- Balls inserted dynamically -->
                </div>
            </div>

            <div class="current-players">
                <div class="batter-row striker">
                    <div>
                        <div class="d-flex align-center" style="gap: 8px;">
                            <i class="fa-solid fa-baseball-bat-ball text-primary"></i>
                            <span id="strikerName">Batter 1</span>
                        </div>
                    </div>
                    <div class="stats-text"><span id="strikerRuns">0</span> (<span id="strikerBalls">0</span>)</div>
                </div>
                <div class="batter-row">
                    <div>
                        <span id="nonStrikerName">Batter 2</span>
                    </div>
                    <div class="stats-text"><span id="nonStrikerRuns">0</span> (<span id="nonStrikerBalls">0</span>)</div>
                </div>
                <div class="bowler-row mt-4">
                    <div>
                        <div class="d-flex align-center" style="gap: 8px;">
                            <i class="fa-solid fa-baseball text-secondary"></i>
                            <span id="bowlerName">Bowler 1</span>
                        </div>
                    </div>
                    <div class="stats-text"><span id="bowlerWickets">0</span>-<span id="bowlerRuns">0</span> (<span id="bowlerOvers">0.0</span>)</div>
                </div>
            </div>

            <div class="scoring-pad">
                <button class="score-btn" data-runs="0">0</button>
                <button class="score-btn" data-runs="1">1</button>
                <button class="score-btn" data-runs="2">2</button>
                <button class="score-btn" data-runs="3">3</button>
                <button class="score-btn boundary" data-runs="4">4</button>
                <button class="score-btn six" data-runs="6">6</button>
            </div>
            
            <div class="extra-controls">
                <button class="extra-btn" id="btnWide">WD</button>
                <button class="extra-btn" id="btnNoBall">NB</button>
                <button class="extra-btn" id="btnLegBye">LB</button>
                <button class="extra-btn wicket" id="btnWicket">W</button>
            </div>
        </main>
    </div>

    <!-- Initial Player Selection Modal -->
    <div id="playerSelectModal" class="modal hidden">
        <div class="modal-content">
            <h2 class="mb-4 text-primary">Select Players</h2>
            <div class="input-group">
                <label>Striker</label>
                <select id="selectStriker" class="input-field"></select>
            </div>
            <div class="input-group">
                <label>Non-Striker (Optional)</label>
                <select id="selectNonStriker" class="input-field">
                    <option value="">None (Single Batsman)</option>
                </select>
            </div>
            <div class="input-group mt-4">
                <label>Bowler</label>
                <select id="selectBowler" class="input-field"></select>
            </div>
            <button class="btn btn-primary btn-block mt-4" id="confirmPlayersBtn">Start Play</button>
        </div>
    </div>

    <!-- Wicket Modal -->
    <div id="wicketModal" class="modal hidden">
        <div class="modal-content">
            <h2 class="text-danger mb-4">WICKET!</h2>
            <div class="input-group">
                <label>Dismissal Type</label>
                <select id="wicketType" class="input-field">
                    <option value="bowled">Bowled</option>
                    <option value="caught">Caught</option>
                    <option value="runout">Run Out</option>
                    <option value="lbw">LBW</option>
                </select>
            </div>
            <div class="input-group mt-4">
                <label>New Batsman</label>
                <select id="newBatsman" class="input-field">
                    <!-- Options populated via JS -->
                </select>
            </div>
            <button class="btn btn-danger btn-block mt-4" id="confirmWicket">Confirm Wicket</button>
        </div>
    </div>

    <!-- Share Match Modal -->
    <div id="shareMatchModal" class="modal hidden">
        <div class="modal-content" style="text-align: center;">
            <span class="close-btn">&times;</span>
            <h2 class="mb-2 text-primary" id="shareMatchName">Match Name</h2>
            <p class="text-muted mb-4">Scan QR or share the URL to join</p>
            <div id="shareQrCode" style="background: white; padding: 10px; border-radius: 10px; display: inline-block; margin-bottom: 20px;"></div>
            
            <div style="text-align: left; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px;">
                <p style="margin-bottom: 5px; font-size: 0.9rem; color: var(--text-muted);">Match ID:</p>
                <p><strong id="shareMatchIdText" style="font-size: 1.2rem; letter-spacing: 2px;"></strong></p>
                
                <p style="margin-bottom: 5px; margin-top: 15px; font-size: 0.9rem; color: var(--text-muted);">Direct Link:</p>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="shareUrlInput" class="input-field" readonly style="margin: 0; padding: 8px; font-size: 0.8rem;">
                    <button class="btn btn-primary" onclick="navigator.clipboard.writeText(document.getElementById('shareUrlInput').value); alert('Copied!');" style="padding: 8px 15px;"><i class="fa-solid fa-copy"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- New Bowler Modal -->
    <div id="newBowlerModal" class="modal hidden">
        <div class="modal-content">
            <h2 class="mb-4 text-primary">End of Over</h2>
            <p class="text-muted mb-4">Batsmen have crossed. Please select a new bowler.</p>
            <div class="input-group">
                <label>New Bowler</label>
                <select id="selectNewBowler" class="input-field">
                    <!-- Options populated via JS -->
                </select>
            </div>
            <button class="btn btn-primary btn-block mt-4" id="confirmNewBowler">Start Next Over</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
