<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manage Players - GullyScore</title>
    <link rel="stylesheet" href="css/style.css">
    <meta name="theme-color" content="#121212">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="top-nav">
            <a href="index.html" class="icon-btn text-primary"><i class="fa-solid fa-home"></i></a>
            <div class="brand"><h2>Global Players</h2></div>
            <div></div>
        </header>

        <!-- Admin Login Overlay -->
        <div id="adminLoginOverlay" style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg-color); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px;">
            <div class="secondary-card" style="width: 100%; text-align: center;">
                <i class="fa-solid fa-lock text-primary fa-3x mb-4"></i>
                <h2 class="mb-4">Admin Access Required</h2>
                <div class="input-group">
                    <input type="password" id="adminPassword" class="input-field" placeholder="Enter Admin Password">
                </div>
                <button class="btn btn-primary btn-block mt-4" id="loginAdminBtn">Login</button>
            </div>
        </div>

        <main class="content fade-in" id="adminContent" style="display: none; padding-bottom: 20px;">
            <div class="secondary-card mb-4">
                <h3 class="mb-3">Add New Player</h3>
                <div class="d-flex" style="gap: 10px;">
                    <input type="text" id="newPlayerName" class="input-field" placeholder="Player Name" style="margin: 0; flex: 1;">
                    <button class="btn btn-primary" id="addGlobalPlayerBtn" style="white-space: nowrap;">Add</button>
                </div>
            </div>

            <div class="d-flex justify-between align-center mb-3">
                <h3>Player Roster</h3>
                <span class="text-muted" id="totalPlayersCount" style="font-size: 0.9rem;">0 Players</span>
            </div>

            <div class="list-group" id="globalPlayersList">
                <div class="loading-spinner"></div>
            </div>
        </main>
    </div>
    
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
