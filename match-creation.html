<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Match Creation - GullyScore</title>
    <link rel="stylesheet" href="css/style.css">
    <meta name="theme-color" content="#121212">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="top-nav">
            <a href="index.html" class="icon-btn"><i class="fa-solid fa-arrow-left"></i></a>
            <div class="brand"><h2>New Match</h2></div>
            <div style="width: 36px;"></div>
        </header>

        <main class="content fade-in">
            <div class="page-header">
                <p>Setup your gully match details</p>
            </div>

            <form id="matchSetupForm">
                <div class="input-group">
                    <label for="matchName">Match Name</label>
                    <input type="text" id="matchName" class="input-field" placeholder="e.g. Sunday Morning Bash" required>
                </div>

                <div class="input-group">
                    <label for="overs">Total Overs</label>
                    <input type="number" id="overs" class="input-field" placeholder="e.g. 5" min="1" max="50" required>
                </div>

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <div class="input-group">
                        <label for="teamAName">Team A Name</label>
                        <input type="text" id="teamAName" class="input-field" placeholder="e.g. KL Boys">
                    </div>
                    <div class="input-group">
                        <label for="teamBName">Team B Name</label>
                        <input type="text" id="teamBName" class="input-field" placeholder="e.g. Street Lions">
                    </div>
                </div>

                <div class="input-group">
                    <label for="venue">Venue (Optional)</label>
                    <input type="text" id="venue" class="input-field" placeholder="e.g. Street 4">
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-primary btn-block">Create Match</button>
                </div>
            </form>
        </main>
    </div>
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
