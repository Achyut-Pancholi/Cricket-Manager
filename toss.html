<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Toss - GullyScore</title>
    <link rel="stylesheet" href="css/style.css">
    <meta name="theme-color" content="#121212">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="top-nav">
            <a href="team-shuffle.html" class="icon-btn"><i class="fa-solid fa-arrow-left"></i></a>
            <div class="brand"><h2>Toss Time</h2></div>
            <div style="width: 36px;"></div>
        </header>

        <main class="content fade-in">
            <div class="toss-container">
                <div class="coin" id="coin">H</div>
                
                <div class="text-center" id="tossControls">
                    <h3 class="mb-4">Team A calls...</h3>
                    <div class="d-flex justify-between" style="gap: 16px;">
                        <button class="btn btn-secondary btn-block" id="callHeads">Heads</button>
                        <button class="btn btn-secondary btn-block" id="callTails">Tails</button>
                    </div>
                </div>

                <div class="text-center hidden" id="tossResult">
                    <h2 class="mb-4 text-primary" id="winnerText">Team A won the toss!</h2>
                    <p class="mb-4">What will they choose?</p>
                    <div class="d-flex justify-between" style="gap: 16px;">
                        <button class="btn btn-primary btn-block" id="chooseBat">Bat</button>
                        <button class="btn btn-secondary btn-block" id="chooseBowl">Bowl</button>
                    </div>
                </div>
            </div>
            
            <div class="mt-4 hidden" id="proceedToMatchContainer">
                <a href="live-score.html" class="btn btn-primary btn-block">Start Match <i class="fa-solid fa-play"></i></a>
            </div>
        </main>
    </div>
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
